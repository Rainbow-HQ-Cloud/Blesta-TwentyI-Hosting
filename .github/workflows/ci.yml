name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: [ '8.1', '8.2', '8.3' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl, json, mbstring
          coverage: none

      - name: Validate composer.json
        # --strict is omitted intentionally: the 20i/api-modules package has no
        # stable releases, so pinning to a commit hash is the correct approach
        # even though Composer flags it as a warning under strict mode.
        run: composer validate

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Syntax check all PHP files
        run: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \; | grep -v "^No syntax errors"  || true

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --testdox

      - name: Run PHP_CodeSniffer (PSR-12)
        run: vendor/bin/phpcs --standard=PSR12 --extensions=php --ignore=vendor/ .

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress
